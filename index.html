<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print API</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .wrap {
      max-width: 520px;
      margin: 48px auto;
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 20px;
      color: #555;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    button {
      width: 100%;
      font: inherit;
    }

    input[type="text"],
    input[type="password"] {
      padding: 12px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #fff;
    }

    input[type="file"] {
      padding: 10px 0;
    }

    button {
      margin-top: 20px;
      padding: 12px 16px;
      border: 0;
      border-radius: 8px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }

    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 56px;
    }

    .ok {
      border-color: #b7e4c7;
      background: #f1fff5;
    }

    .error {
      border-color: #f1b0b7;
      background: #fff5f6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Print File</h1>
    <p>Upload a PDF, JPG, or PNG and send it to your printer API.</p>

    <label for="apiUrl">API URL</label>
    <input id="apiUrl" type="text" value="/print" />

    <label for="apiKey">API Key</label>
    <input id="apiKey" type="password" placeholder="Enter your API key" />

    <label for="uploadFile">File</label>
    <input
      id="uploadFile"
      type="file"
      accept="application/pdf,image/jpeg,image/png,.pdf,.jpg,.jpeg,.png"
    />

    <button id="submitBtn">Send to print</button>

    <div class="hint">
      Supported formats: PDF, JPG, PNG.
    </div>

    <div id="status" class="status">No request sent yet.</div>
  </div>

  <script>
    const apiUrlInput = document.getElementById('apiUrl');
    const apiKeyInput = document.getElementById('apiKey');
    const uploadFileInput = document.getElementById('uploadFile');
    const submitBtn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('status');

    function setStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = 'status';
      if (type) statusBox.classList.add(type);
    }

    submitBtn.addEventListener('click', async () => {
      const apiUrl = apiUrlInput.value.trim();
      const apiKey = apiKeyInput.value.trim();
      const file = uploadFileInput.files[0];

      if (!apiUrl) {
        setStatus('Please enter the API URL.', 'error');
        return;
      }

      if (!apiKey) {
        setStatus('Please enter the API key.', 'error');
        return;
      }

      if (!file) {
        setStatus('Please choose a file.', 'error');
        return;
      }

      const allowedTypes = ['application/pdf', 'image/jpeg', 'image/png'];
      if (file.type && !allowedTypes.includes(file.type)) {
        setStatus('Selected file must be a PDF, JPG, or PNG.', 'error');
        return;
      }

      submitBtn.disabled = true;
      setStatus('Uploading file and waiting for printer response...');

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': file.type || 'application/octet-stream',
            'X-API-Key': apiKey
          },
          body: file
        });

        const rawText = await response.text();
        let formatted = rawText;

        try {
          formatted = JSON.stringify(JSON.parse(rawText), null, 2);
        } catch (e) {}

        if (response.ok) {
          setStatus('Success:\n\n' + formatted, 'ok');
        } else {
          setStatus('Request failed (' + response.status + '):\n\n' + formatted, 'error');
        }
      } catch (error) {
        setStatus('Network error:\n\n' + error.message, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
