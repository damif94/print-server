<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kai Deco · Etiquetas</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
</head>
<body style="margin:0">
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const TYPE_LABELS = {
      mercadolibre: "Mercado Libre",
      mlmelinet:    "ML Melinet",
      gestionpost:  "GestionPost",
      shopify:      "Shopify",
    };

    function App() {
      const [tab,      setTab]      = useState("pdf");
      const [apiBase,  setApiBase]  = useState("");
      const [apiKey,   setApiKey]   = useState("");
      const [preview,  setPreview]  = useState(null);   // {url, blob, labelType}
      const [busy,     setBusy]     = useState(false);
      const [error,    setError]    = useState(null);
      const [printMsg, setPrintMsg] = useState(null);   // {ok, msg}
      const [drag,     setDrag]     = useState(false);
      const [form,     setForm]     = useState({name:"", address:"", city:"", country:"Uruguay", phone:"", notes:""});

      const url  = path => `${apiBase}${path}`;
      const auth = ()   => ({ "X-API-Key": apiKey.trim() });

      const clearPreview = () => { setPreview(null); setError(null); setPrintMsg(null); };
      const switchTab    = t  => { setTab(t); clearPreview(); };

      const handlePdf = async (file) => {
        if (!file || !file.name.toLowerCase().endsWith(".pdf")) return;
        clearPreview();
        setBusy(true);
        try {
          const res = await fetch(url("/convert"), {
            method: "POST",
            headers: { ...auth(), "Content-Type": "application/pdf", "X-Filename": file.name },
            body: file,
          });
          if (!res.ok) {
            const j = await res.json().catch(() => ({}));
            setError(j.error || `Error ${res.status}`);
            return;
          }
          const labelType = res.headers.get("X-Label-Type") || "";
          const blob = await res.blob();
          setPreview({ url: URL.createObjectURL(blob), blob, labelType });
        } catch(e) {
          setError(e.message);
        } finally {
          setBusy(false);
        }
      };

      const handleGenerate = async () => {
        if (!form.name.trim()) return;
        clearPreview();
        setBusy(true);
        try {
          const res = await fetch(url("/label"), {
            method: "POST",
            headers: { ...auth(), "Content-Type": "application/json" },
            body: JSON.stringify(form),
          });
          if (!res.ok) {
            const j = await res.json().catch(() => ({}));
            setError(j.error || `Error ${res.status}`);
            return;
          }
          const blob = await res.blob();
          setPreview({ url: URL.createObjectURL(blob), blob, labelType: "" });
        } catch(e) {
          setError(e.message);
        } finally {
          setBusy(false);
        }
      };

      const handlePrint = async () => {
        if (!preview || busy) return;
        setBusy(true);
        setPrintMsg(null);
        try {
          const res = await fetch(url("/print"), {
            method: "POST",
            headers: { ...auth(), "Content-Type": "image/png" },
            body: preview.blob,
          });
          const j = await res.json();
          setPrintMsg({ ok: res.ok, msg: res.ok ? "✅ Enviado a imprimir" : "❌ " + (j.error || res.status) });
        } catch(e) {
          setPrintMsg({ ok: false, msg: "❌ " + e.message });
        } finally {
          setBusy(false);
        }
      };

      const S = {
        root:  { minHeight:"100vh", background:"#f0f0ee", fontFamily:"'Helvetica Neue',Arial,sans-serif", padding:"20px 14px" },
        wrap:  { maxWidth:680, margin:"0 auto" },
        card:  { background:"#fff", borderRadius:14, padding:22, boxShadow:"0 2px 16px rgba(0,0,0,.07)", marginBottom:12 },
        label: { fontSize:11, fontWeight:700, color:"#888", letterSpacing:1, textTransform:"uppercase", display:"block", marginBottom:5 },
        input: { width:"100%", padding:"11px 14px", border:"1px solid #e0e0e0", borderRadius:8, fontSize:15, outline:"none", fontFamily:"inherit", background:"#fafafa" },
        tab:   a => ({ padding:"10px 20px", borderRadius:8, border:"none", cursor:"pointer", fontWeight:700, fontSize:14, background:a?"#111":"#e8e8e8", color:a?"#fff":"#555", transition:"all .15s" }),
        btn:   on => ({ padding:"11px 22px", borderRadius:8, border:"none", cursor:on?"pointer":"not-allowed", background:on?"#111":"#ddd", color:on?"#fff":"#aaa", fontWeight:700, fontSize:14, transition:"all .15s" }),
      };

      const Spinner = () => (
        <div style={{width:22,height:22,border:"3px solid #ddd",borderTopColor:"#333",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
      );

      const PreviewPanel = ({ downloadName }) => (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,minWidth:160}}>
          <div style={{width:152,height:190,background:"#f0f0f0",borderRadius:6,overflow:"hidden",
            display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,.1)"}}>
            {busy  && <Spinner/>}
            {!busy && error   && <div style={{color:"#f55",fontSize:11,padding:8,textAlign:"center"}}>{error}</div>}
            {!busy && !error  && preview && <img src={preview.url} style={{width:"100%",height:"100%",objectFit:"contain"}} alt="preview"/>}
            {!busy && !error  && !preview && <span style={{color:"#ccc",fontSize:22}}>—</span>}
          </div>
          <div style={{fontSize:9,color:"#ccc"}}>638×799px · 203dpi</div>

          {preview && !busy && (<>
            <a href={preview.url} download={downloadName}
              style={{...S.btn(true),textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6,padding:"9px 18px",fontSize:13}}>
              ⬇ Descargar
            </a>
            <button onClick={handlePrint} disabled={!apiKey.trim()}
              style={{...S.btn(!!apiKey.trim()),padding:"9px 18px",fontSize:13}}>
              🖨 Imprimir
            </button>
            {!apiKey.trim() && <div style={{fontSize:10,color:"#ccc",textAlign:"center"}}>Ingresá la API key</div>}
            {printMsg && (
              <div style={{fontSize:12,fontWeight:600,textAlign:"center",color:printMsg.ok?"#2e7d32":"#c62828"}}>
                {printMsg.msg}
              </div>
            )}
          </>)}
        </div>
      );

      return (
        <div style={S.root}>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}*{box-sizing:border-box;margin:0;padding:0}input:focus,textarea:focus{border-color:#999!important;background:#fff!important}`}</style>
          <div style={S.wrap}>

            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
              <div style={{background:"#000",color:"#fff",padding:"7px 16px",borderRadius:6,fontWeight:800,fontSize:20}}>KAI DECO</div>
              <div style={{color:"#aaa",fontSize:13}}>Generador de etiquetas · 80×100mm</div>
            </div>

            {/* Config */}
            <div style={{...S.card,padding:16}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div>
                  <label style={S.label}>Servidor</label>
                  <input style={S.input} value={apiBase} onChange={e=>setApiBase(e.target.value)} placeholder="http://192.168.0.x:8080 (vacío = este servidor)"/>
                </div>
                <div>
                  <label style={S.label}>API Key</label>
                  <input style={S.input} type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="••••••••"/>
                </div>
              </div>
            </div>

            {/* Tabs */}
            <div style={{display:"flex",gap:8,margin:"12px 0"}}>
              <button style={S.tab(tab==="pdf")}    onClick={()=>switchTab("pdf")}>📄 Desde PDF</button>
              <button style={S.tab(tab==="manual")} onClick={()=>switchTab("manual")}>✏️ Manual</button>
            </div>

            {/* ── PDF TAB ── */}
            {tab==="pdf" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:20,alignItems:"start"}}>
                <div style={S.card}>
                  <div
                    onDragOver={e=>{e.preventDefault();setDrag(true)}}
                    onDragLeave={()=>setDrag(false)}
                    onDrop={e=>{e.preventDefault();setDrag(false);handlePdf(e.dataTransfer.files[0])}}
                    onClick={()=>document.getElementById("_fi").click()}
                    style={{border:`2px dashed ${drag?"#555":"#ddd"}`,borderRadius:10,padding:"36px 20px",
                      textAlign:"center",cursor:"pointer",background:drag?"#f5f5f5":"#fafafa",transition:"all .2s"}}
                  >
                    <div style={{fontSize:36,marginBottom:8}}>📤</div>
                    <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>Subí tu PDF</div>
                    <div style={{color:"#bbb",fontSize:12}}>arrastrá o hacé click</div>
                    <div style={{color:"#ddd",fontSize:11,marginTop:6}}>ML · GestionPost · Shopify — detecta automático</div>
                    <input id="_fi" type="file" accept=".pdf" style={{display:"none"}} onChange={e=>{handlePdf(e.target.files[0]);e.target.value="";}}/>
                  </div>

                  {preview?.labelType && (
                    <div style={{marginTop:12,padding:"7px 12px",borderRadius:6,background:"#f0fff0",border:"1px solid #c8e6c9",fontSize:12}}>
                      ✅ Detectado como <b>{TYPE_LABELS[preview.labelType] || preview.labelType}</b>
                    </div>
                  )}
                </div>
                <PreviewPanel downloadName={`etiqueta_${preview?.labelType||"pdf"}_${Date.now()}.png`}/>
              </div>
            )}

            {/* ── MANUAL TAB ── */}
            {tab==="manual" && (
              <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:20,alignItems:"start"}}>
                <div style={S.card}>
                  <div style={{fontWeight:800,fontSize:16,marginBottom:16}}>Nueva etiqueta</div>
                  {[
                    {key:"name",    label:"Nombre *",              placeholder:"Ej: Gonzalo Cámara"},
                    {key:"address", label:"Dirección",             placeholder:"Ej: Av. Gonzalo Ramírez 1329 Apto 1909"},
                    {key:"city",    label:"Ciudad / Cód. postal",  placeholder:"Ej: 11100 Montevideo"},
                    {key:"country", label:"País",                  placeholder:"Ej: Uruguay"},
                    {key:"phone",   label:"Teléfono",              placeholder:"Ej: 099 238 500"},
                  ].map(({key,label,placeholder})=>(
                    <div key={key} style={{marginBottom:12}}>
                      <label style={S.label}>{label}</label>
                      <input style={S.input} placeholder={placeholder} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})}/>
                    </div>
                  ))}
                  <div style={{marginBottom:16}}>
                    <label style={S.label}>Notas <span style={{fontWeight:400,textTransform:"none",letterSpacing:0,color:"#ccc"}}>(opcional)</span></label>
                    <textarea style={{...S.input,height:72,resize:"vertical"}}
                      placeholder="Ej: Entregar en portería, llamar antes..."
                      value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
                  </div>
                  <button onClick={handleGenerate} disabled={!form.name.trim()||busy}
                    style={{...S.btn(!!form.name.trim()&&!busy),width:"100%",padding:"13px"}}>
                    Generar etiqueta
                  </button>
                  <button onClick={()=>{setForm({name:"",address:"",city:"",country:"Uruguay",phone:"",notes:""});clearPreview();}}
                    style={{width:"100%",marginTop:8,padding:"8px",borderRadius:8,border:"1px solid #eee",background:"transparent",color:"#ccc",fontSize:12,cursor:"pointer"}}>
                    Limpiar
                  </button>
                </div>
                <PreviewPanel downloadName={`etiqueta_${form.name.replace(/\s+/g,"_")||Date.now()}.png`}/>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
