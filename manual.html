<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kai Deco · Etiqueta Manual</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f0ee; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo { background: #000; color: #fff; padding: 8px 16px; border-radius: 6px; font-weight: 800; font-size: 18px; }
    .titulo { color: #aaa; font-size: 13px; }
    label { display: block; font-size: 11px; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; margin-top: 16px; }
    input, textarea { width: 100%; padding: 11px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; font-family: Arial; background: #fafafa; outline: none; }
    input:focus, textarea:focus { border-color: #999; background: #fff; }
    textarea { height: 70px; resize: vertical; }
    .btn { width: 100%; margin-top: 24px; padding: 14px; border-radius: 8px; border: none; background: #111; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn:hover { background: #333; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .status { margin-top: 16px; padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; display: none; }
    .status.ok { background: #e8f5e9; color: #2e7d32; display: block; }
    .status.err { background: #ffebee; color: #c62828; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo">KAI DECO</div>
      <div class="titulo">Etiqueta manual</div>
    </div>

    <label>Nombre del cliente *</label>
    <input id="name" type="text" placeholder="Ej: Gonzalo Cámara"/>

    <label>Dirección</label>
    <input id="address" type="text" placeholder="Ej: Av. Gonzalo Ramírez 1329"/>

    <label>Ciudad / Departamento</label>
    <input id="city" type="text" placeholder="Ej: Montevideo"/>

    <label>Teléfono</label>
    <input id="phone" type="text" placeholder="Ej: 099 238 500"/>

    <label>Notas <span style="color:#ccc;font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
    <textarea id="notes" placeholder="Ej: Entregar en portería, llamar antes..."></textarea>

    <button class="btn" id="btn" onclick="imprimir()">🖨️ Imprimir etiqueta</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function imprimir() {
      const name = document.getElementById('name').value.trim();
      if (!name) { alert('El nombre es obligatorio'); return; }

      const btn = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.textContent = 'Imprimiendo...';
      status.className = 'status';
      status.textContent = '';

      try {
        const res = await fetch('/label', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-API-Key': 'agustinmanya1994'
          },
          body: JSON.stringify({
            name:    document.getElementById('name').value.trim(),
            address: document.getElementById('address').value.trim(),
            city:    document.getElementById('city').value.trim(),
            phone:   document.getElementById('phone').value.trim(),
            notes:   document.getElementById('notes').value.trim(),
          })
        });

        if (res.ok) {
          // Ahora imprimir la imagen generada
          const blob = await res.blob();
          const printRes = await fetch('/print', {
            method: 'POST',
            headers: {
              'Content-Type': 'image/png',
              'X-API-Key': 'agustinmanya1994'
            },
            body: blob
          });

          if (printRes.ok) {
            status.className = 'status ok';
            status.textContent = '✅ Etiqueta enviada a imprimir';
            document.getElementById('name').value = '';
            document.getElementById('address').value = '';
            document.getElementById('city').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('notes').value = '';
          } else {
            const data = await printRes.json();
            status.className = 'status err';
            status.textContent = '❌ Error al imprimir: ' + (data.error || printRes.status);
          }
        } else {
          const data = await res.json();
          status.className = 'status err';
          status.textContent = '❌ Error: ' + (data.error || res.status);
        }
      } catch(e) {
        status.className = 'status err';
        status.textContent = '❌ No se pudo conectar con la impresora';
      }

      btn.disabled = false;
      btn.textContent = '🖨️ Imprimir etiqueta';
    }
  </script>
</body>
</html>
